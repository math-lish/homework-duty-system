<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欠交功課當值表格 - 自動編排系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, "PingFang HK", "Microsoft JhengHei", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        header h1 { color: #1e3c72; margin-bottom: 5px; }
        
        .section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .section h2 { color: #1e3c72; margin-bottom: 15px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; }
        
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary { background: #1e3c72; color: white; }
        .btn-primary:hover { background: #2a5298; transform: translateY(-2px); }
        
        .btn-secondary { background: #4CAF50; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #1e3c72; color: white; }
        tr:nth-child(even) { background: #f8f9fa; }
        
        .room-301 { background: #e3f2fd !important; }
        .room-305 { background: #fff3e0 !important; }
        .room-g01b { background: #e8f5e9 !important; }
        
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .summary-card { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; }
        .summary-card .num { font-size: 1.8rem; font-weight: bold; color: #1e3c72; }
        
        .paste-instructions {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
        }
        
        .help-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #333;
        }
        
        @media print {
            body { background: white; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 欠交功課當值表格 - 自動編排系統</h1>
            <p>中華聖潔會靈風中學 | 第三學期</p>
        </header>
        
        <div class="section no-print">
            <h2>📥 貼上Excel數據</h2>
            
            <div class="paste-instructions">
                <strong>使用方法：</strong> 直接由Excel既Sheet3貼上兩樣野：<br>
                1. 先貼老師數據（第一行唔洗）- 直接貼Column I-M既61行<br>
                2. 再貼日期數據 - 直接貼Column A既日期<br>
                <em>（系統會自動識別老師當值次數同日期）</em>
            </div>
            
            <div class="input-group">
                <label>老師數據 (格式：老師ID, 301次數, 305次數, G01A次數, 總次數)</label>
                <textarea id="rawTeachers" placeholder="例如：
1	2	0	0	2
2	2	0	0	2
3	0	0	0	0
4	2	1	0	3
..."></textarea>
            </div>
            
            <div class="input-group">
                <label>當值日期 (由Excel Column A貼上)</label>
                <textarea id="rawDates" placeholder="例如：
2025/9/10	3	24	（舊數據）
2026/3/16	1	（第三學期開始）"></textarea>
            </div>
            
            <button class="btn-primary" onclick="loadFromSheet()">🔄 處理數據並生成編排</button>
            <button class="btn-secondary" onclick="printSchedule()">🖨️ 列印表格</button>
        </div>
        
        <div class="section" id="resultsSection" style="display: none;">
            <h2>📊 編排結果</h2>
            <div class="summary" id="summary"></div>
            <table id="scheduleTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>Day</th>
                        <th>房間</th>
                        <th>當值老師</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        let teachers = [];
        let dates = [];
        
        function loadFromSheet() {
            // Process teachers from raw input
            const rawTeachers = document.getElementById('rawTeachers').value.trim();
            if (!rawTeachers) {
                alert('請貼上老師數據！');
                return;
            }
            
            // Parse teacher data - look for the term 2 data (columns I-M)
            // Format: 老師ID\t第一學期\t第二學期\t第三學期\t總計
            const teacherCounts = {};
            const lines = rawTeachers.split('\n');
            
            for (let line of lines) {
                // Skip empty lines
                if (!line.trim()) continue;
                
                // Split by tab or multiple spaces
                const parts = line.split(/[\t,\s]+/).filter(p => p);
                if (parts.length < 2) continue;
                
                // Try to find teacher ID and term 2 count
                // Looking at the data: row number = teacher ID, columns after are counts
                // For term 2, it's column M (4th column after ID)
                // Or we can use column I (1st data column) which seems to be term 1
                
                // The format seems to be: 列號,第一列data,第二列data,...
                // Let's use the last column as term 2 or the one labeled
                
                // Simple approach: use the 4th number as term 2 count
                const nums = parts.map(p => parseInt(p.replace(/[^0-9]/g, ''))).filter(n => !isNaN(n));
                if (nums.length >= 2) {
                    const teacherId = nums[0];
                    // The 4th number seems to be term 2
                    const term2Count = nums.length >= 5 ? nums[4] : (nums.length >= 2 ? nums[1] : 0);
                    if (teacherId && teacherId > 0 && teacherId <= 61) {
                        teacherCounts[teacherId] = totalCount || 0;
                    }
                }
            }
            
            // Filter exempt teachers (3,5,12,18,22,42,44,51)
            const exempt = {3:1, 5:1, 12:1, 18:1, 22:1, 42:1, 44:1, 51:1};
            
            teachers = [];
            for (let id in teacherCounts) {
                if (!exempt[id]) {
                    teachers.push({
                        name: '老師' + id.padStart(2, '0'),
                        prevCount: teacherCounts[id],
                        assignedCount: 0,
                        id: parseInt(id)
                    });
                }
            }
            
            // Sort by duty count ascending
            teachers.sort((a, b) => a.prevCount - b.prevCount);
            
            // Process dates
            const rawDates = document.getElementById('rawDates').value.trim();
            dates = [];
            
            if (rawDates) {
                const dateLines = rawDates.split('\n');
                for (let line of dateLines) {
                    if (!line.trim()) continue;
                    
                    // Look for 2026 dates (third term)
                    const match = line.match(/(2026[/-]\d+[/-]\d+)/);
                    if (match) {
                        // Try to extract day number
                        const parts = line.split(/[\t,]+/).filter(p => p.trim());
                        let dayNum = 1;
                        for (let p of parts) {
                            const d = parseInt(p.replace(/[^0-9]/g, ''));
                            if (d >= 1 && d <= 5) {
                                dayNum = d;
                                break;
                            }
                        }
                        
                        const dateStr = match[1].replace(/\//g, '-');
                        dates.push({ date: dateStr, day: dayNum, teachers: [] });
                    }
                }
            }
            
            if (dates.length === 0) {
                alert('搵唔到日期！請確保貼上2026年既日期');
                return;
            }
            
            if (teachers.length === 0) {
                alert('搵唔到老師數據！請貼上正確格式');
                return;
            }
            
            // Generate schedule
            generateSchedule();
        }
        
        function generateSchedule() {
            const roomPriority = ['301', '305', 'G01B'];
            
            // Generate assignments
            dates.forEach(slot => {
                const usedToday = [];
                
                roomPriority.forEach(room => {
                    // Find available teacher
                    let available = teachers.filter(t => {
                        if (usedToday.includes(t.name)) return false;
                        if (t.assignedCount >= 3) return false;  // Max 3 per term
                        return true;
                    });
                    
                    // Sort by previous count (ascending) and prefer less assigned
                    available.sort((a, b) => a.prevCount - b.prevCount);
                    
                    if (available.length > 0) {
                        const selected = available[0];
                        slot.teachers.push({ room: room, teacher: selected.name });
                        selected.assignedCount++;
                        usedToday.push(selected.name);
                    } else {
                        slot.teachers.push({ room: room, teacher: '（待安排）' });
                    }
                });
            });
            
            displayResults();
        }
        
        function displayResults() {
            const rooms = {'301': [], '305': [], 'G01B': []};
            const allDates = [...new Set(dates.map(d => d.date))];
            
            dates.forEach(slot => {
                slot.teachers.forEach(t => {
                    rooms[t.room].push({date: slot.date, day: slot.day, teacher: t.teacher});
                });
            });
            
            // ========== Format 1: Rooms as top row, Dates in Column A ==========
            let html1 = '<h3>第一款：課室在頂，日期在左</h3>';
            html1 += '<table style="width:100%; border-collapse:collapse; margin-bottom:30px;"><thead><tr><th style="background:#1e3c72;color:white;padding:10px;">地點</th>';
            allDates.forEach(date => {
                const slot = dates.find(d => d.date === date);
                const day = slot ? 'Day ' + slot.day : '';
                html1 += '<th style="background:#1e3c72;color:white;padding:6px;font-size:0.75rem;">' + date.replace('2026-','') + '<br>' + day + '</th>';
            });
            html1 += '</tr></thead><tbody>';
            ['301', '305', 'G01B'].forEach(room => {
                html1 += '<tr><td style="background:#e3f2fd;padding:8px;font-weight:bold;">' + room + '</td>';
                allDates.forEach(date => {
                    const a = rooms[room].find(r => r.date === date);
                    html1 += '<td style="padding:6px;text-align:center;border:1px solid #eee;font-size:0.85rem;">' + (a ? a.teacher.replace('老師','') : '') + '</td>';
                });
                html1 += '</tr>';
            });
            html1 += '</tbody></table>';
            
            // ========== Format 2: Rooms in Column A, 10 dates per row ==========
            let html2 = '<h3>第二款：課室在左，10日一row</h3>';
            
            // Split dates into chunks of 10
            const chunkSize = 10;
            for (let i = 0; i < allDates.length; i += chunkSize) {
                const chunkDates = allDates.slice(i, i + chunkSize);
                
                html2 += '<table style="width:100%; border-collapse:collapse; margin-bottom:20px;"><thead><tr><th style="background:#1e3c72;color:white;padding:8px;width:60px;">課室</th>';
                chunkDates.forEach(date => {
                    const slot = dates.find(d => d.date === date);
                    const day = slot ? 'Day' + slot.day : '';
                    html2 += '<th style="background:#1e3c72;color:white;padding:6px;font-size:0.75rem;">' + date.replace('2026-','') + '<br>' + day + '</th>';
                });
                // Fill empty columns to make 10
                for (let j = chunkDates.length; j < 10; j++) {
                    html2 += '<th style="background:#eee;padding:6px;"></th>';
                }
                html2 += '</tr></thead><tbody>';
                
                ['301', '305', 'G01B'].forEach(room => {
                    html2 += '<tr><td style="background:#e3f2fd;padding:8px;font-weight:bold;text-align:center;">' + room + '</td>';
                    chunkDates.forEach(date => {
                        const a = rooms[room].find(r => r.date === date);
                        html2 += '<td style="padding:6px;text-align:center;border:1px solid #eee;">' + (a ? a.teacher.replace('老師','') : '') + '</td>';
                    });
                    for (let j = chunkDates.length; j < 10; j++) {
                        html2 += '<td style="background:#f9f9f9;border:1px solid #eee;"></td>';
                    }
                    html2 += '</tr>';
                });
                html2 += '</tbody></table>';
            }
            
            document.getElementById('scheduleBody').innerHTML = html1 + html2;
            
            const totalAssignments = dates.reduce((sum, slot) => sum + slot.teachers.filter(t => t.teacher !== '（待安排）').length, 0);
            const unassigned = dates.reduce((sum, slot) => sum + slot.teachers.filter(t => t.teacher === '（待安排）').length, 0);
            const teachersWithDuty = teachers.filter(t => t.assignedCount > 0).length;
            
            document.getElementById('summary').innerHTML = '<div class="summary-card"><div class="num">' + dates.length + '</div><div class="label">總當值日</div></div><div class="summary-card"><div class="num">' + totalAssignments + '</div><div class="label">已編排</div></div><div class="summary-card"><div class="num">' + unassigned + '</div><div class="label">未編排</div></div><div class="summary-card"><div class="num">' + teachersWithDuty + '</div><div class="label">參與老師</div></div>';
            
            document.getElementById('resultsSection').style.display = 'block';
        }
        
        function printSchedule() {
            window.print();
        }
    </script>
</body>
</html>
