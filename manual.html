<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>手動輸入當值表</title>
    <style>
        body { font-family: -apple-system, "PingFang HK", sans-serif; padding: 20px; background: #f5f5f5; }
        h2 { color: #1e3c72; }
        textarea { width: 100%; height: 150px; padding: 10px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #1e3c72; color: white; }
        .btn { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h2>手動輸入當值表</h2>
    <p>貼上直表格式既當值表（由Excel直接copy）：</p>
    <textarea id="input" placeholder="日期	Day	301	305	G01B
2026-03-16	1	陳大明	李四海	林美娟"></textarea>
    <br>
    <button class="btn" onclick="showTable()">顯示表格</button>
    <button class="btn" onclick="copyInput()" style="background:#2196F3;">複製內容</button>
    
    <div id="output"></div>
    
    <script>
        function showTable() {
            const lines = document.getElementById('input').value.trim().split('\n');
            let html = '<table><thead><tr><th>日期</th><th>Day</th><th>301</th><th>305</th><th>G01B</th></tr></thead><tbody>';
            
            lines.forEach(line => {
                if (!line.trim()) return;
                const cols = line.split('\t');
                if (cols.length >= 3) {
                    html += '<tr>';
                    cols.forEach(col => {
                        html += '<td>' + col.trim() + '</td>';
                    });
                    html += '</tr>';
                }
            });
            html += '</tbody></table>';
            document.getElementById('output').innerHTML = html;
        }
        
        function copyInput() {
            navigator.clipboard.writeText(document.getElementById('input').value);
            alert('已複製！');
        }
    </script>
</body>
</html>
