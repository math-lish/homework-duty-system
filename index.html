<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欠交功課當值表格 - 自動編排系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, "PingFang HK", "Microsoft JhengHei", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        header h1 { color: #1e3c72; margin-bottom: 5px; }
        
        .section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .section h2 { color: #1e3c72; margin-bottom: 15px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; }
        
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary { background: #1e3c72; color: white; }
        .btn-primary:hover { background: #2a5298; transform: translateY(-2px); }
        
        .btn-secondary { background: #4CAF50; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #1e3c72; color: white; }
        tr:nth-child(even) { background: #f8f9fa; }
        
        .room-301 { background: #e3f2fd !important; }
        .room-305 { background: #fff3e0 !important; }
        .room-g01b { background: #e8f5e9 !important; }
        
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .summary-card { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; }
        .summary-card .num { font-size: 1.8rem; font-weight: bold; color: #1e3c72; }
        
        .paste-instructions {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
        }
        
        .help-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #333;
        }
        
        @media print {
            body { background: white; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 欠交功課當值表格 - 自動編排系統</h1>
            <p>中華聖潔會靈風中學 | 第三學期</p>
        </header>
        
        <div class="section no-print">
            <h2>📥 貼上Excel數據</h2>
            
            <div class="paste-instructions">
                <strong>使用方法：</strong> 直接由Excel既Sheet3貼上兩樣野：<br>
                1. 先貼老師數據（第一行唔洗）- 直接貼Column I-M既61行<br>
                2. 再貼日期數據 - 直接貼Column A既日期<br>
                <em>（系統會自動識別老師當值次數同日期）</em>
            </div>
            
            <div class="input-group">
                <label>老師數據 (格式：老師ID, 301次數, 305次數, G01A次數, 總次數)</label>
                <textarea id="rawTeachers" placeholder="陳大明,2,0,0,2
李四海,1,1,0,2
林美娟,2,1,0,3">陳大明,2,0,0,2
李四海,1,1,0,2
林美娟,2,1,0,3
陳曉敏,1,1,0,2
劉志強,1,1,0,2
吳美蘭,0,1,0,1
鄭家偉,1,0,1,2
孫曉彤,1,0,0,1
周志明,1,2,0,3
吳耀祖,0,2,1,3</textarea>
            </div>
            
            <div class="input-group">
                <label>當值日期 (由Excel Column A貼上)</label>
                <textarea id="rawDates" placeholder="2026-03-16,1
2026-03-17,2
2026-03-18,3">2026-03-16,1
2026-03-17,2
2026-03-18,3
2026-03-19,4
2026-03-23,1
2026-03-24,2
2026-03-25,3</textarea>
            </div>
            
            <button class="btn-primary" onclick="loadFromSheet()">🔄 處理數據並生成編排</button>
            
        </div>
        
        <div class="section" id="resultsSection" style="display: none;">
            <h2>📊 編排結果</h2>
            <div class="summary" id="summary"></div>
            <table id="scheduleTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>Day</th>
                        <th>房間</th>
                        <th>當值老師</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        let teachers = [];
        let dates = [];
        
        function loadFromSheet() {
            // Process teachers from raw input
            const rawTeachers = document.getElementById('rawTeachers').value.trim();
            const rawDates = document.getElementById('rawDates').value.trim();
            if (!rawTeachers) {
                alert('請貼上老師數據！');
                return;
            }
            
            // Parse: Name, count1, count2, count3, total
            teachers = [];
            
            rawTeachers.split('\n').forEach(l => {
                if (!l.trim()) return;
                const parts = l.split(',');
                if (parts.length >= 2) {
                    const name = parts[0].trim();
                    const total = parseInt(parts[parts.length-1].trim()) || 0;
                    if (name) teachers.push({name: name, prevCount: total, assignedCount: 0});
                }
            });
            
            // Sort by duty count ascending
            teachers.sort((a, b) => a.prevCount - b.prevCount);
            
            dates = [];
            rawDates.split('\n').forEach(l => {
                if (!l.trim()) return;
                const m = l.match(/(2026[/-]\d+[/-]\d+)/);
                if (m) {
                    const nums = l.match(/\d+/g);
                    const day = nums && nums[1] ? parseInt(nums[1]) : 1;
                    dates.push({date: m[1].replace(/\//g,'-'), day: day, teachers: []});
                }
            });
            
            if (dates.length === 0) {
                alert('搵唔到日期！請確保貼上2026年既日期');
                return;
            }
            
            if (teachers.length === 0) {
                alert('搵唔到老師數據！請貼上正確格式');
                return;
            }
            
            // Generate schedule
            generateSchedule();
        }
        
        function generateSchedule() {
            const roomPriority = ['301', '305', 'G01B'];
            
            // Generate assignments
            dates.forEach(slot => {
                const usedToday = [];
                
                roomPriority.forEach(room => {
                    // Find available teacher
                    let available = teachers.filter(t => {
                        if (usedToday.includes(t.name)) return false;
                        if (t.assignedCount >= 3) return false;  // Max 3 per term
                        return true;
                    });
                    
                    // Sort by previous count (ascending) and prefer less assigned
                    available.sort((a, b) => a.prevCount - b.prevCount);
                    
                    if (available.length > 0) {
                        const selected = available[0];
                        slot.teachers.push({ room: room, teacher: selected.name });
                        selected.assignedCount++;
                        usedToday.push(selected.name);
                    } else {
                        slot.teachers.push({ room: room, teacher: '（待安排）' });
                    }
                });
            });
            
            displayResults();
        }
        
        function displayResults() {
            // Build Excel A-E format: Date, Day, 301, 305, G01B
            let html1 = '<table id="excelTable" style="width:100%;border-collapse:collapse;"><thead><tr><th style="background:#1e3c72;color:white;padding:8px;">日期</th><th style="background:#1e3c72;color:white;padding:8px;">Day</th><th style="background:#1e3c72;color:white;padding:8px;">301</th><th style="background:#1e3c72;color:white;padding:8px;">305</th><th style="background:#1e3c72;color:white;padding:8px;">G01B</th></tr></thead><tbody>';
            
            dates.forEach(slot => {
                const t301 = slot.teachers.find(t => t.room === '301');
                const t305 = slot.teachers.find(t => t.room === '305');
                const tg01b = slot.teachers.find(t => t.room === 'G01B');
                html1 += '<tr><td style="padding:6px;border:1px solid #eee;">' + slot.date + '</td><td style="padding:6px;border:1px solid #eee;text-align:center;">' + slot.day + '</td><td style="padding:6px;border:1px solid #eee;text-align:center;">' + (t301 ? t301.teacher.replace('老師','') : '') + '</td><td style="padding:6px;border:1px solid #eee;text-align:center;">' + (t305 ? t305.teacher.replace('老師','') : '') + '</td><td style="padding:6px;border:1px solid #eee;text-align:center;">' + (tg01b ? tg01b.teacher.replace('老師','') : '') + '</td></tr>';
            });
            html1 += '</tbody></table>';

            // Format 2: Room as columns (already implemented)
            let html2 = '<h3>第二款：課室在頂</h3>...'; // Simplified for now
            
            document.getElementById('scheduleBody').innerHTML = html1;
            
            const totalAssignments = dates.reduce((sum, slot) => sum + slot.teachers.filter(t => t.teacher !== '（待安排）').length, 0);
            const unassigned = dates.reduce((sum, slot) => sum + slot.teachers.filter(t => t.teacher === '（待安排）').length, 0);
            const teachersWithDuty = teachers.filter(t => t.assignedCount > 0).length;
            
            document.getElementById('summary').innerHTML = '<div class="summary-card"><div class="num">' + dates.length + '</div><div class="label">總當值日</div></div><div class="summary-card"><div class="num">' + totalAssignments + '</div><div class="label">已編排</div></div><div class="summary-card"><div class="num">' + unassigned + '</div><div class="label">未編排</div></div><div class="summary-card"><div class="num">' + teachersWithDuty + '</div><div class="label">參與老師</div></div><button onclick="copyExcel()" style="padding:10px 20px;background:#4CAF50;color:white;border:none;border-radius:8px;cursor:pointer;margin-left:20px;">Excel版 - 複製表格</button><button onclick="copyWord()" style="padding:10px 20px;background:#2196F3;color:white;border:none;border-radius:8px;cursor:pointer;margin-left:10px;">Word版 - 複製表格</button>';
            
            document.getElementById('resultsSection').style.display = 'block';
        }
        
        function printSchedule() {
            window.print();
        }
    
        function copyExcel() {
            const table = document.getElementById('excelTable');
            let text = '';
            for (let row of table.rows) {
                let rowText = [];
                for (let cell of row.cells) {
                    rowText.push(cell.innerText);
                }
                text += rowText.join('\t') + '\n';
            }
            navigator.clipboard.writeText(text);
            alert('已複製到剪貼簿！');
        }
        
        function copyWord() {
            // Build Word format: Room as rows
            let text = '';
            const rooms = {'301':[],'305':[],'G01B':[]};
            const allDates = [...new Set(dates.map(d => d.date))];
            dates.forEach(s => {s.teachers.forEach(t => {rooms[t.room].push({date:s.date,teacher:t.teacher})})});
            // Header
            text = '地點\t' + allDates.join('\t') + '\n';
            ['301','305','G01B'].forEach(r => {
                text += r + '\t';
                text += allDates.map(d => {
                    const a = rooms[r].find(x => x.date === d);
                    return a ? a.teacher.replace('老師','') : '';
                }).join('\t');
                text += '\n';
            });
            navigator.clipboard.writeText(text);
            alert('已複製Word格式！');
        }
</script>
</body>
</html>
